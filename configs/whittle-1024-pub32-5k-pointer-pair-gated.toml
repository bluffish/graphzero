# Gated-policy leg: whittle-1024-pub32-5k-pointer-pair with
# reference = "gated-policy" -- the historical-best rollout bar
# (strict-accept arena gate). Compare against pointer-pair-2 (ungated,
# labels saturated +1 against the soft forced-play bar).
#
# -2: 32x32 workers + eval batch 128 (the validated scaling shape;
# -1 ran 32x8/batch-32 at 0.47 eps/s with 11/48 cores and a half-idle
# eval GPU).

[arch]
dim = 128
layers = 4
heads = 4
ffn_dim = 512
dropout = 0.1
policy_head = "pointer"
value_input = "pair"

[trainer]
lr = 0.0003
lr_schedule = "constant"
warmup_steps = 2000
batch = 256
window_rows = 50000
total_steps = 5000
publish_interval = 32
value_weight = 1.0
ema_decay = 0.999
grad_clip = 1.0
min_startup_rows = 8192
seed = 42
device = "cuda:1"
startup_timeout = 600.0
reconnect_limit = 5
log_interval = 10
step_sleep = 0.0
bootstrap_episodes = 128

[selfplay]
lanes = 32
workers_per_lane = 64
simulations = 48
max_considered = 8
gumbel_scale = 1.0
max_steps = 128
max_candidates = 1023
reference = "gated-policy"
root_mode = "fixed"
reference_ema_decay = 0.99
max_row_backlog = 1000000
replay_retain = 150000
eval_device = "cuda:0"
eval_poll_interval = 2.0
seed = 42
max_batch = 256
python_dir = "python"

[wandb]
project = "graphzero"
run_name = "whittle-1024-pub32-5k-pointer-pair-gated-4"

[paths]
run_dir = "runs/whittle-1024-pub32-5k-pointer-pair-gated"
graphzero_bin = "target/release/graphzero"
