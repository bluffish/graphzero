# Actual full-scale Whittle run: 1023 engine candidates + STOP = a clean
# 1024-wide static action mask, 128-move limit, model-selected STOP.
#
# Selfplay throughput at this action width is CPU-bound (feature
# extraction); 8/48 considered/simulations with tree reuse keeps row
# production and target quality balanced.

[arch]
dim = 128
layers = 4
heads = 4
ffn_dim = 512
dropout = 0.1

[trainer]
lr = 0.0003
warmup_steps = 2000
batch = 256
window_rows = 500000
total_steps = 100000
publish_interval = 1000
value_weight = 1.0
ema_decay = 0.999
grad_clip = 1.0
min_startup_rows = 8192
seed = 2
device = "cuda:1"
startup_timeout = 600.0
reconnect_limit = 5
log_interval = 10
step_sleep = 0.0
bootstrap_episodes = 128

[selfplay]
lanes = 32
workers_per_lane = 8
simulations = 48
max_considered = 8
gumbel_scale = 1.0
max_steps = 128
max_candidates = 1023
reference = "self-average"
reference_ema_decay = 0.99
max_row_backlog = 1000000
replay_retain = 600000
eval_device = "cuda:0"
eval_poll_interval = 10.0
seed = 2
max_batch = 32
python_dir = "python"

[wandb]
project = "graphzero"
run_name = "whittle-full-1024-1"

[paths]
run_dir = "runs/whittle-full-1024"
graphzero_bin = "target/release/graphzero"
