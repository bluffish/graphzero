# whittle-1024-constlr with one change: the policy opponent labels
# episodes against a greedy rollout of the current published checkpoint
# from the fixed root, refreshed per swap -- a non-drifting "beat your
# own argmax policy" bar instead of the self-average EMA. Clean A/B
# against whittle-1024-constlr-1 (10.0% mean reduction, best 90).

[arch]
dim = 128
layers = 4
heads = 4
ffn_dim = 512
dropout = 0.1

[trainer]
lr = 0.0003
lr_schedule = "constant"
warmup_steps = 2000
batch = 256
window_rows = 50000
total_steps = 100000
publish_interval = 1000
value_weight = 1.0
ema_decay = 0.999
grad_clip = 1.0
min_startup_rows = 8192
seed = 42
device = "cuda:1"
startup_timeout = 600.0
reconnect_limit = 5
log_interval = 10
step_sleep = 0.0
bootstrap_episodes = 128

[selfplay]
lanes = 32
workers_per_lane = 8
simulations = 48
max_considered = 8
gumbel_scale = 1.0
max_steps = 128
max_candidates = 1023
reference = "policy"
root_mode = "fixed"
reference_ema_decay = 0.99
max_row_backlog = 1000000
replay_retain = 150000
eval_device = "cuda:0"
eval_poll_interval = 10.0
seed = 42
max_batch = 32
python_dir = "python"

[wandb]
project = "graphzero"
run_name = "whittle-1024-policy-1"

[paths]
run_dir = "runs/whittle-1024-policy"
graphzero_bin = "target/release/graphzero"
