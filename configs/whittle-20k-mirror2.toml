# mirror2: the mirror leg rerun on a clean label channel. The first
# mirror run was contaminated -- ~2100 pre-reference episodes filled
# the 4000-row window and the trainer spent ~10k steps on rows no loss
# could use (vacc 0.00 / vloss 0.000 sentinel), so value_mirror was
# never actually tested. Two changes vs whittle-20k-mirror:
#   - pre-reference episodes are now dropped at the source (code
#     change, no knob): the store holds only labeled rows from row 1;
#   - length_tiebreak = true, whittlezero's duration tie-break in
#     discrete form (equal reward -> shorter episode wins, then coin).
#     The good run (v5d-...-stoplen-...) trained with this on; ties
#     carry an efficiency gradient instead of coin noise.
# Otherwise identical to whittle-20k-mirror.

[arch]
dim = 128
layers = 3
heads = 4
ffn_dim = 512
dropout = 0.1
trunk = "sage"
sage_layers = 3
policy_head = "pointer"
value_input = "pair"
subject_encoding = "match"
value_activation = "logit"

[trainer]
lr = 0.0003
lr_schedule = "constant"
warmup_steps = 0
batch = 256
window_rows = 4000
total_steps = 20000
publish_interval = 32
value_weight = 1.0
ema_decay = 0.0
grad_clip = 1.0
min_startup_rows = 8192
seed = 42
device = "cuda:1"
startup_timeout = 3600.0
reconnect_limit = 5
log_interval = 10
step_sleep = 0.0
bootstrap_episodes = 128
value_mirror = true

[selfplay]
lanes = 44
workers_per_lane = 48
simulations = 48
max_considered = 8
gumbel_scale = 1.0
gumbel_noise_overlap = 0.5
tree_reuse = false
max_steps = 128
max_candidates = 1023

reference = "gated-policy"
reference_gamma = 0.2
length_tiebreak = true
root_mode = "fixed"
reference_ema_decay = 0.99
max_row_backlog = 1000000
replay_retain = 16000
eval_device = "cuda:0"
eval_poll_interval = 2.0
seed = 42
max_batch = 256
python_dir = "python"

[wandb]
project = "graphzero"
run_name = "whittle-20k-mirror2-1"

[paths]
run_dir = "runs/whittle-20k-mirror2"
graphzero_bin = "target/release/graphzero"
