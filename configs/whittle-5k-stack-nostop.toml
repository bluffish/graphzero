# The no-stop leg: mask_stop = true removes STOP from the learner's
# search wherever a rewrite exists, so episodes run the full 128-move
# budget like the (always STOP-masked) reference rollouts -- the game
# becomes symmetric "who ends lower after the budget" and the entire
# stop-valuation surface drops out. Stacked on the whittle-v2
# featurization leg (killed early on request; its 5k comparison was
# never completed).

# ("the stack" = noema + gated + sage + tanh pair + fresh 4k window +
# overlap 0.5 + alignment fix + whittle-v2 features; the accumulated
# leg-name chain overflowed SUN_LEN for the run-dir sockets, hence the
# short name.)

[arch]
dim = 128
layers = 3
heads = 4
ffn_dim = 512
dropout = 0.1
trunk = "sage"
sage_layers = 3
policy_head = "pointer"
value_input = "pair"
value_activation = "tanh"

[trainer]
lr = 0.0003
lr_schedule = "constant"
warmup_steps = 0
batch = 256
window_rows = 4000
total_steps = 5000
publish_interval = 32
value_weight = 1.0
ema_decay = 0.0
grad_clip = 1.0
min_startup_rows = 8192
seed = 42
device = "cuda:1"
startup_timeout = 600.0
reconnect_limit = 5
log_interval = 10
step_sleep = 0.0
bootstrap_episodes = 128

[selfplay]
lanes = 44
workers_per_lane = 48
simulations = 48
max_considered = 8
gumbel_scale = 1.0
gumbel_noise_overlap = 0.5
max_steps = 128
max_candidates = 1023
mask_stop = true
reference = "gated-policy"
root_mode = "fixed"
reference_ema_decay = 0.99
max_row_backlog = 1000000
replay_retain = 150000
eval_device = "cuda:0"
eval_poll_interval = 2.0
seed = 42
max_batch = 256
python_dir = "python"

[wandb]
project = "graphzero"
run_name = "whittle-5k-stack-nostop-1"

[paths]
run_dir = "runs/whittle-5k-stack-nostop"
graphzero_bin = "target/release/graphzero"
