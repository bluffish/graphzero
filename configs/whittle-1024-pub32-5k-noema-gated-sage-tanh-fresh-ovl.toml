# The overlap leg: gumbel_noise_overlap 0.5 auto-tempers the root
# noise per move so a noisy draw lands in the prior's top-8 ~55% of the
# time. Our fixed gumbel_scale 1.0 over ~771 root candidates put the
# noise max (~7.2) on par with the tanh-clipped logit range, making
# data episodes near-random (greedy rollouts 92-102 vs noisy episodes
# 127-160). Single-variable A/B against the fresh leg (label +0.21,
# terminal 118, best 98 at 5k).

[arch]
dim = 128
layers = 3
heads = 4
ffn_dim = 512
dropout = 0.1
trunk = "sage"
sage_layers = 3
policy_head = "pointer"
value_input = "pair"
value_activation = "tanh"

[trainer]
lr = 0.0003
lr_schedule = "constant"
warmup_steps = 0
batch = 256
window_rows = 4000
total_steps = 5000
publish_interval = 32
value_weight = 1.0
ema_decay = 0.0
grad_clip = 1.0
min_startup_rows = 8192
seed = 42
device = "cuda:1"
startup_timeout = 600.0
reconnect_limit = 5
log_interval = 10
step_sleep = 0.0
bootstrap_episodes = 128

[selfplay]
lanes = 44
workers_per_lane = 48
simulations = 48
max_considered = 8
gumbel_scale = 1.0
gumbel_noise_overlap = 0.5
max_steps = 128
max_candidates = 1023
reference = "gated-policy"
root_mode = "fixed"
reference_ema_decay = 0.99
max_row_backlog = 1000000
replay_retain = 150000
eval_device = "cuda:0"
eval_poll_interval = 2.0
seed = 42
max_batch = 256
python_dir = "python"

[wandb]
project = "graphzero"
run_name = "whittle-1024-pub32-5k-noema-gated-sage-tanh-fresh-ovl-1"

[paths]
run_dir = "runs/whittle-1024-pub32-5k-noema-gated-sage-tanh-fresh-ovl"
graphzero_bin = "target/release/graphzero"
